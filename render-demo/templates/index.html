<!DOCTYPE html>
<html>

<head>
    <title>Heart Disease Prediction</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }

        .container {
            width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0, 0, 0, .1);
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background: #d62828;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            font-size: 18px;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 24px;
            color: green;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>Heart Disease Prediction System</h2>

        <form action="/predict" method="post">

            <label>Age</label>
            <input type="number" name="age" required>

            <label>Resting Blood Pressure</label>
            <input type="number" name="trestbps" required>

            <label>Cholesterol</label>
            <input type="number" name="chol" required>

            <label>Max Heart Rate</label>
            <input type="number" name="thalch" required>

            <label>Oldpeak</label>
            <input type="number" step="0.1" name="oldpeak" required>

            <label>Number of Major Vessels (ca)</label>
            <input type="number" name="ca" required>

            <label>Sex</label>
            <select name="sex">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Chest Pain Type</label>
            <select name="cp">
                <option value="typical angina">Typical Angina</option>
                <option value="asymptomatic">Asymptomatic</option>
                <option value="non-anginal">Non-anginal</option>
                <option value="atypical angina">Atypical Angina</option>
            </select>

            <label>Fasting Blood Sugar</label>
            <select name="fbs">
                <option value="TRUE">True</option>
                <option value="FALSE">False</option>
            </select>

            <label>Rest ECG</label>
            <select name="restecg">
                <option value="normal">Normal</option>
                <option value="lv hypertrophy">LV Hypertrophy</option>
                <option value="st-t abnormality">ST-T abnormality</option>
            </select>

            <label>Exercise Induced Angina</label>
            <select name="exang">
                <option value="TRUE">Yes</option>
                <option value="FALSE">No</option>
            </select>

            <label>Slope</label>
            <select name="slope">
                <option value="upsloping">Upsloping</option>
                <option value="flat">Flat</option>
                <option value="downsloping">Downsloping</option>
            </select>

            <label>Thal</label>
            <select name="thal">
                <option value="normal">Normal</option>
                <option value="fixed defect">Fixed Defect</option>
                <option value="reversable defect">Reversible Defect</option>
            </select>

            <label>Dataset</label>
            <select name="dataset">
                <option value="Cleveland">Cleveland</option>
                <option value="Hungary">Hungary</option>
                <option value="VA">VA</option>
                <option value="Switzerland">Switzerland</option>
            </select>

            <button type="submit">Predict</button>

        </form>

        {% if prediction_text %}
        <div class="result">
            {{ prediction_text }}
        </div>
        {% endif %}

    </div>

</body>

</html>
